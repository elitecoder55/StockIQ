# render.yaml — Render Blueprint for StockIQ
# Deploy: Connect this repo on render.com → "New Blueprint Instance"

services:
  # ── Backend API ──
  - type: web
    name: stockiq-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:5000
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: stockiq-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true

  # ── Frontend (Static Site) ──
  - type: web
    name: stockiq-web
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://stockiq-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: stockiq-db
    plan: free
    databaseName: stockiq
